on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:
jobs:
  build-app:
    name: Build app
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true

      - name: Validate gradle wrapper checksum
        uses: gradle/actions/wrapper-validation@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          java-version: 21
          cache: gradle

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          cache-dependency-path: rcbridge/go.sum
          go-version-file: rcbridge/go.mod

      - name: Build and test
        run: |
          echo "开始构建"
          chmod +x gradlew
          ./gradlew assembleDebug --build-cache --parallel --no-daemon --warning-mode all

      - name: Upload App To Artifact
        uses: actions/upload-artifact@v4
        with:
          name: beta
          if-no-files-found: ignore
          path: ${{ github.workspace }}/app/build/outputs/apk/*/*.apk
